    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Transparent so the parent page background shows through */
      background: transparent;
      overflow: hidden;
    }

    /* GDevelop places the canvas absolutely at top:0 left:0.
       We intercept that with a full-size flex wrapper so the
       canvas always fills the iframe exactly. */
    #gdjs-canvas-wrapper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Optimize canvas pixel rendering and remove click highlights */
    canvas {
      image-rendering: pixelated;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    /* Hide the GDevelop watermark overlay div */
    #watermark,
    #watermark-background,
    #watermark-link {
      display: none !important;
    }
  </style>

  <script>
    (function () {
      // Force disable GDevelop splash screens, watermarks, loading screens and delays
      if (gdjs.projectData && gdjs.projectData.properties) {
        gdjs.projectData.properties.showWatermark = false;
        if (gdjs.projectData.properties.loadingScreen) {
          gdjs.projectData.properties.loadingScreen.showGDevelopSplash = false;
          gdjs.projectData.properties.loadingScreen.showProgressBar = false;
          gdjs.projectData.properties.loadingScreen.minDuration = 0;
          gdjs.projectData.properties.loadingScreen.backgroundFadeInDuration = 0;
          gdjs.projectData.properties.loadingScreen.logoAndProgressFadeInDuration = 0;
        }
      }

      // Initialize and start the GDevelop game
      var game = new gdjs.RuntimeGame(gdjs.projectData, {});
      window.gdjsGame = game;
      game.getRenderer().createStandardCanvas(document.body);
      game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
      game.loadAllAssets(function () {
        game.startGameLoop();

        // Autoplay/autostart the game once assets are loaded
        setTimeout(function () {
          // Focus the canvas so the user can control it immediately with keyboard
          window.focus();
          var canvas = document.querySelector('canvas');
          if (canvas) {
            canvas.focus();
            canvas.click();
            
            // Dispatch Spacebar keypress to trigger immediate game start
            var spaceDown = new KeyboardEvent('keydown', {
              key: ' ',
              code: 'Space',
              keyCode: 32,
              which: 32,
              bubbles: true
            });
            var spaceUp = new KeyboardEvent('keyup', {
              key: ' ',
              code: 'Space',
              keyCode: 32,
              which: 32,
              bubbles: true
            });
            canvas.dispatchEvent(spaceDown);
            setTimeout(function() {
              canvas.dispatchEvent(spaceUp);
            }, 50);

            // Dispatch mobile touch event only in environments that support TouchEvent
            if (typeof TouchEvent !== 'undefined') {
              try {
                var touchStart = new TouchEvent('touchstart', { bubbles: true });
                var touchEnd = new TouchEvent('touchend', { bubbles: true });
                canvas.dispatchEvent(touchStart);
                setTimeout(function() {
                  canvas.dispatchEvent(touchEnd);
                }, 50);
              } catch (e) {
                // TouchEvent constructor not supported on this browser — skip silently
              }
            }
          }
        }, 100);

        // Hide watermark overlays instantly (just in case they are generated dynamically)
        var wm = document.getElementById('watermark');
        var wmBg = document.getElementById('watermark-background');
        var wmLink = document.getElementById('watermark-link');
        if (wm) wm.style.display = 'none';
        if (wmBg) wmBg.style.display = 'none';
        if (wmLink) wmLink.style.pointerEvents = 'none';
      });
    })();
  </script>
